<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossary — Spoken Bangla (Shudho)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --card:    #22263a;
      --border:  #2e3347;
      --accent:  #6c8fff;
      --accent2: #a78bfa;
      --green:   #34d399;
      --amber:   #fbbf24;
      --text:    #e4e8f1;
      --muted:   #8891a8;
      --small:   #6b7390;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ─── SITE NAV ─── */
    .site-nav { position: sticky; top: 0; z-index: 50; background: rgba(15,17,23,0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .site-nav-inner { max-width: 700px; margin: 0 auto; padding: 11px 20px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .site-nav-brand { font-size: 14px; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.2px; white-space: nowrap; }
    .site-nav-brand span { color: var(--accent2); }
    .site-nav-links { display: flex; gap: 16px; }
    .site-nav-links a { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; transition: color 0.15s; white-space: nowrap; }
    .site-nav-links a:hover, .site-nav-links a.active { color: var(--accent); }
    .site-footer-nav { max-width: 700px; margin: 48px auto 0; padding: 28px 20px 8px; border-top: 1px solid var(--border); }
    .site-footer-nav-links { display: flex; justify-content: center; flex-wrap: wrap; font-size: 13px; }
    .site-footer-nav-links a { color: var(--muted); text-decoration: none; font-weight: 600; }
    .site-footer-nav-links a:hover { color: var(--accent); }
    .site-footer-nav-links .sep { color: var(--border); margin: 0 10px; }
    @media (max-width: 480px) {
      .site-nav-links { gap: 12px; }
      .site-nav-brand { font-size: 13px; }
    }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(160deg, #151827 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 52px 24px 44px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--accent2);
      margin-bottom: 18px;
    }
    header h1 { font-size: clamp(26px, 5vw, 38px); font-weight: 800; letter-spacing: -0.5px; }
    .header-desc { font-size: 16px; color: var(--muted); max-width: 460px; margin: 14px auto 0; }

    /* ─── CONTAINER ─── */
    .container { max-width: 700px; margin: 0 auto; padding: 0 20px; }

    /* ─── SEARCH ─── */
    .glossary-search {
      width: 100%; margin: 28px 0 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      color: var(--text); font-size: 15px; outline: none;
      font-family: inherit; transition: border-color 0.15s;
    }
    .glossary-search:focus { border-color: var(--accent); }

    /* ─── RENDERED MARKDOWN ─── */
    #glossary { padding-top: 8px; }
    .md-h1 { display: none; } /* header already shows the title */
    .md-h2 {
      font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      margin: 38px 0 6px; padding-top: 22px; border-top: 1px solid var(--border);
    }
    .md-p { margin: 13px 0; font-size: 15px; line-height: 1.7; }
    .md-p strong { color: var(--accent2); font-weight: 700; }
    .md-p em { color: var(--amber); font-style: normal; font-size: 13.5px; }
    .md-ul { list-style: none; margin: 2px 0 14px; padding: 0; }
    .md-ul li {
      font-size: 13px; color: var(--muted); line-height: 1.6;
      margin: 3px 0; padding-left: 16px; position: relative;
    }
    .md-ul li::before { content: "–"; position: absolute; left: 0; color: var(--small); }
    .md-ul li strong { color: var(--text); }
    .md-ul li em { color: var(--text); font-style: italic; }
    .md-quote {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent2); border-radius: 10px;
      padding: 16px 20px; margin: 20px 0 8px;
    }
    .md-quote .md-p { margin: 6px 0; font-size: 14px; color: var(--muted); }
    .md-quote .md-p strong { color: var(--text); }
    .md-quote .md-p em { color: var(--amber); }
    .md-quote .md-ul { margin: 8px 0 4px; }
    .md-quote .md-ul li { color: var(--muted); }
    .md-hr { display: none; }

    .term-entry.hidden { display: none; }
    .glossary-status { color: var(--muted); font-size: 14px; padding: 24px 0; text-align: center; }
    .glossary-status a { color: var(--accent); }
    .no-results { color: var(--small); font-size: 14px; padding: 16px 0; text-align: center; display: none; }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="../index.html" class="site-nav-brand">Learn <span>Bangla</span></a>
      <div class="site-nav-links">
        <a href="../index.html">Home</a>
        <a href="pronunciation-guide.html">Pronunciation</a>
        <a href="glossary.html" class="active">Glossary</a>
      </div>
    </div>
  </nav>

  <header>
    <div class="badge">Reference · Vocabulary</div>
    <h1>Full Glossary</h1>
    <p class="header-desc">Every term introduced so far, grouped by topic. Phonetics only — no script.</p>
  </header>

  <div class="container">
    <input type="text" id="search" class="glossary-search" placeholder="Search terms, meanings, or sounds…" oninput="filterGlossary(this.value)" autocomplete="off">
    <div id="glossary">
      <div class="glossary-status">Loading glossary…</div>
    </div>
    <div class="no-results" id="noResults">No terms match your search.</div>

    <nav class="site-footer-nav">
      <div class="site-footer-nav-links">
        <a href="../index.html">Home</a><span class="sep">·</span>
        <a href="pronunciation-guide.html">Pronunciation</a><span class="sep">·</span>
        <a href="glossary.html">Glossary</a>
      </div>
    </nav>
  </div>

  <script>
  (function () {
    function inlineMd(t) {
      return t
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/_([^_]+)_/g, '<em>$1</em>');
    }

    function renderBlocks(lines) {
      var html = '', i = 0, m;
      while (i < lines.length) {
        var line = lines[i];
        if (/^\s*$/.test(line)) { i++; continue; }
        if (m = line.match(/^(#{1,6})\s+(.*)$/)) {
          var lvl = m[1].length;
          html += '<h' + lvl + ' class="md-h' + lvl + '">' + inlineMd(m[2]) + '</h' + lvl + '>';
          i++; continue;
        }
        if (/^---+\s*$/.test(line)) { html += '<hr class="md-hr">'; i++; continue; }
        if (/^>\s?/.test(line)) {
          var qbuf = [];
          while (i < lines.length && /^>\s?/.test(lines[i])) { qbuf.push(lines[i].replace(/^>\s?/, '')); i++; }
          html += '<div class="md-quote">' + renderBlocks(qbuf) + '</div>';
          continue;
        }
        if (/^\s*-\s+/.test(line)) {
          var items = [];
          while (i < lines.length && /^\s*-\s+/.test(lines[i])) {
            items.push('<li>' + inlineMd(lines[i].replace(/^\s*-\s+/, '')) + '</li>');
            i++;
          }
          html += '<ul class="md-ul">' + items.join('') + '</ul>';
          continue;
        }
        // paragraph: this line plus any indented continuation/sub-bullets attach after
        var pbuf = [line]; i++;
        while (i < lines.length && !/^\s*$/.test(lines[i]) &&
               !/^#{1,6}\s/.test(lines[i]) && !/^>/.test(lines[i]) &&
               !/^\s*-\s/.test(lines[i]) && !/^---+\s*$/.test(lines[i])) {
          pbuf.push(lines[i]); i++;
        }
        html += '<p class="md-p">' + inlineMd(pbuf.join(' ')) + '</p>';
      }
      return html;
    }

    // Wrap each term (a <p> followed by its <ul> notes) so search can show/hide units.
    function groupEntries(container) {
      var nodes = Array.prototype.slice.call(container.childNodes);
      var frag = document.createDocumentFragment();
      var i = 0;
      while (i < nodes.length) {
        var node = nodes[i];
        if (node.nodeType === 1 && node.classList && node.classList.contains('md-p')) {
          var wrap = document.createElement('div');
          wrap.className = 'term-entry';
          wrap.appendChild(node.cloneNode(true));
          // attach following md-ul siblings (the term's notes)
          var j = i + 1;
          while (j < nodes.length && nodes[j].nodeType === 1 &&
                 nodes[j].classList && nodes[j].classList.contains('md-ul')) {
            wrap.appendChild(nodes[j].cloneNode(true));
            j++;
          }
          frag.appendChild(wrap);
          i = j;
        } else {
          frag.appendChild(node.cloneNode(true));
          i++;
        }
      }
      container.innerHTML = '';
      container.appendChild(frag);
    }

    window.filterGlossary = function (q) {
      q = q.trim().toLowerCase();
      var entries = document.querySelectorAll('#glossary .term-entry');
      var anyVisible = false;
      entries.forEach(function (el) {
        var match = !q || el.textContent.toLowerCase().indexOf(q) !== -1;
        el.classList.toggle('hidden', !match);
        if (match) anyVisible = true;
      });
      // hide section headers with no visible entries under them
      var headers = document.querySelectorAll('#glossary .md-h2');
      headers.forEach(function (h) {
        var sib = h.nextElementSibling, show = false;
        while (sib && !sib.classList.contains('md-h2')) {
          if (sib.classList.contains('term-entry') && !sib.classList.contains('hidden')) { show = true; break; }
          sib = sib.nextElementSibling;
        }
        h.style.display = (q && !show) ? 'none' : '';
      });
      document.getElementById('noResults').style.display = (q && !anyVisible) ? 'block' : 'none';
    };

    fetch('../GLOSSARY.md', { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(function (md) {
        var el = document.getElementById('glossary');
        el.innerHTML = renderBlocks(md.split('\n'));
        groupEntries(el);
      })
      .catch(function (e) {
        document.getElementById('glossary').innerHTML =
          '<div class="glossary-status">Could not load the glossary (' + e.message + ').<br>' +
          'View it directly on <a href="https://github.com/anth87/learn-bangla/blob/main/GLOSSARY.md" target="_blank">GitHub</a>.</div>';
      });
  })();
  </script>

</body>
</html>
