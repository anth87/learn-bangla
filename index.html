<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Bangla</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 0.25rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .lesson-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .lesson-nav button {
      padding: 0.5rem 1rem;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .lesson-nav button:hover {
      border-color: #6366f1;
      color: #e2e8f0;
    }

    .lesson-nav button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
      font-weight: 600;
    }

    .lesson-header {
      margin-bottom: 1.5rem;
    }

    .lesson-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .lesson-header .bangla-title {
      font-size: 1.8rem;
      color: #a5b4fc;
      margin-top: 0.25rem;
    }

    .lesson-header p {
      margin-top: 0.5rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: #6366f1;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99,102,241,0.2);
    }

    .card .bangla {
      font-size: 2.4rem;
      line-height: 1.3;
      color: #c7d2fe;
      font-weight: 500;
    }

    .card .roman {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 0.3rem;
    }

    .card .english {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.1rem;
    }

    .card .audio-hint {
      position: absolute;
      top: 0.5rem;
      right: 0.6rem;
      font-size: 0.65rem;
      color: #475569;
    }

    /* Wide cards for phrases */
    .phrase-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .phrase-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      align-items: center;
      transition: all 0.15s;
    }

    .phrase-card:hover {
      border-color: #6366f1;
    }

    .phrase-card .bangla {
      font-size: 1.5rem;
      color: #c7d2fe;
    }

    .phrase-card .roman {
      color: #94a3b8;
      font-style: italic;
    }

    .phrase-card .english {
      color: #64748b;
      text-align: right;
    }

    .col-labels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      padding: 0 1.25rem;
      margin-bottom: 0.5rem;
    }

    .col-labels span {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
    }

    .col-labels span:last-child {
      text-align: right;
    }

    .progress-bar {
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      margin-bottom: 2rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #475569;
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .phrase-card { grid-template-columns: 1fr 1fr; }
      .phrase-card .english { display: none; }
      .col-labels span:last-child { display: none; }
    }
  </style>
</head>
<body>

  </header>

  </div>

    let current = 0;

    function renderNav() {
      const nav = document.getElementById('lessonNav');
      nav.innerHTML = lessons.map((l, i) => `
        <button class="${i === current ? 'active' : ''}" onclick="setLesson(${i})">
          ${l.title}
        </button>
      `).join('');
    }

    function renderLesson() {
      const l = lessons[current];
      const pct = Math.round(((current + 1) / lessons.length) * 100);
      document.getElementById('progress').style.width = pct + '%';

      let body = '';
      if (l.type === 'cards') {
        body = `<div class="card-grid">${l.items.map(item => `
          <div class="card">
            <div class="bangla">${item.bangla.replace(/\n/g, '<br>')}</div>
            <div class="roman">${item.roman}</div>
            <div class="english">${item.english}</div>
          </div>
        `).join('')}</div>`;
      } else {
        body = `
          <div class="col-labels">
            <span>Bangla</span><span>Romanisation</span><span>English</span>
          </div>
          <div class="phrase-list">${l.items.map(item => `
            <div class="phrase-card">
              <div class="bangla">${item.bangla}</div>
              <div class="roman">${item.roman}</div>
              <div class="english">${item.english}</div>
            </div>
          `).join('')}</div>`;
      }

      document.getElementById('lessonContent').innerHTML = `
        <div class="lesson-header">
          <h2>${l.title}</h2>
          <div class="bangla-title">${l.banglaTitle}</div>
          <p>${l.description}</p>
        </div>
        ${body}
      `;
    }

    function setLesson(i) {
      current = i;
      renderNav();
      renderLesson();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderNav();
    renderLesson();
  </script>
</body>
</html>
